on: [push, pull_request]
name: Test
jobs:
  test-on-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ssh_config
        uses: actions/checkout@v6
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Run tests with race detector on
        run: make race-test
  test-on-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout ssh_config
        uses: actions/checkout@v6
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Run tests with race detector on
        run: make race-test
  test-on-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout ssh_config
        uses: actions/checkout@v6
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Run tests with race detector on
        run: make test
